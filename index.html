<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="睡眠打卡">
<meta name="theme-color" content="#c96442">
<title>🌙 睡眠打卡</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* Claude-inspired warm palette */
    --bg-base:       #f5f4f0;
    --bg-surface:    #faf9f6;
    --bg-card:       #ffffff;
    --bg-sidebar:    #ede9e3;

    --accent:        #c96442;   /* Claude's warm terracotta */
    --accent-hover:  #b5562f;
    --accent-muted:  #f0e6e0;
    --accent-soft:   rgba(201, 100, 66, 0.12);

    --gold:          #d4874a;
    --gold-soft:     #fef3e8;

    --text-primary:  #1c1917;
    --text-secondary:#78716c;
    --text-tertiary: #a8a29e;

    --border:        #e5e0d8;
    --border-strong: #d0c9be;

    --green:         #3b7c5e;
    --green-soft:    #e8f4ee;
    --yellow:        #b5830a;
    --yellow-soft:   #fef9e7;
    --red:           #c0392b;
    --red-soft:      #fdecea;

    --shadow-sm: 0 1px 3px rgba(28,25,23,0.06), 0 1px 2px rgba(28,25,23,0.04);
    --shadow-md: 0 4px 12px rgba(28,25,23,0.08), 0 2px 6px rgba(28,25,23,0.04);
    --shadow-lg: 0 8px 24px rgba(28,25,23,0.10), 0 4px 8px rgba(28,25,23,0.06);
    --radius: 14px;
    --radius-sm: 9px;
    --radius-pill: 100px;
  }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 90px;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== TAB BAR ===== */
  .tab-bar {
    display: flex;
    position: fixed;
    bottom: env(safe-area-inset-bottom, 12px);
    left: 12px; right: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(28,25,23,0.10), 0 1px 4px rgba(28,25,23,0.06);
    padding: 4px 0;
  }
  .tab-btn {
    flex: 1; padding: 11px 8px 10px;
    background: none; border: none;
    color: var(--text-tertiary);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.02em;
    display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    cursor: pointer; transition: color 0.18s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn .tab-icon {
    font-size: 20px; line-height: 1;
    display: block;
  }

  .tab-page { display: none; padding: 24px 16px; }
  .tab-page.active { display: block; }

  /* ===== PAGE HEADER ===== */
  .page-header {
    margin-bottom: 24px;
  }
  .page-header h2 {
    font-family: 'Lora', serif;
    font-size: 22px; font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .page-header p {
    font-size: 13px; color: var(--text-secondary);
    margin-top: 3px;
  }

  /* ===== CLOCK PAGE ===== */
  .clock-page {
    padding-top: 36px;
    text-align: center;
  }
  .clock-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 10px;
  }
  .current-time {
    font-family: 'Lora', serif;
    font-size: 56px; font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -1px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .current-ampm {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px; font-weight: 400;
    color: var(--text-secondary);
    margin-left: 4px;
    vertical-align: super;
    font-size: 16px;
  }
  .current-date {
    color: var(--text-secondary); font-size: 14px;
    margin-top: 8px; margin-bottom: 48px;
  }

  /* ===== PUNCH BUTTON ===== */
  .punch-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-bottom: 32px;
  }
  .punch-btn {
    width: 168px; height: 168px;
    border-radius: 50%; border: none; cursor: pointer;
    display: inline-flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
    position: relative;
    outline: none;
  }
  .punch-btn::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: border-color 0.18s, transform 0.18s;
  }
  .punch-btn:hover { transform: scale(1.03); }
  .punch-btn:active { transform: scale(0.96); }
  .punch-btn:hover::before { border-color: rgba(201,100,66,0.25); }

  .punch-btn.sleep-btn {
    background: var(--accent);
    box-shadow: 0 8px 32px rgba(201,100,66,0.35), 0 2px 8px rgba(201,100,66,0.2);
    color: white;
  }
  .punch-btn.sleep-btn:hover {
    box-shadow: 0 12px 40px rgba(201,100,66,0.4), 0 4px 12px rgba(201,100,66,0.25);
  }
  .punch-btn.wake-btn {
    background: var(--gold);
    box-shadow: 0 8px 32px rgba(212,135,74,0.35), 0 2px 8px rgba(212,135,74,0.2);
    color: white;
  }
  .punch-btn.wake-btn:hover {
    box-shadow: 0 12px 40px rgba(212,135,74,0.4), 0 4px 12px rgba(212,135,74,0.25);
  }
  .punch-btn .btn-icon { font-size: 38px; line-height: 1; }
  .punch-btn .btn-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    letter-spacing: 0.01em;
  }

  /* ===== STATUS TEXT ===== */
  .status-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    box-shadow: var(--shadow-sm);
    max-width: 320px;
    margin: 0 auto;
  }
  .status-card .time-highlight {
    color: var(--accent);
    font-weight: 600;
    font-size: 15px;
  }

  /* ===== QUICK ADJUST ===== */
  .quick-adjust {
    margin-top: 16px;
    display: flex; gap: 8px;
    justify-content: center; flex-wrap: wrap;
  }
  .adjust-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 7px 14px; border-radius: var(--radius-pill);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .adjust-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .adjust-btn:active {
    transform: scale(0.97);
  }

  /* ===== CARDS & RECORDS ===== */
  .section-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 12px; margin-top: 8px;
  }

  .record-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: center;
    justify-content: space-between;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.12s;
    box-shadow: var(--shadow-sm);
  }
  .record-card:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }
  .record-card:active { transform: scale(0.99); }

  .record-left { display: flex; flex-direction: column; gap: 6px; }
  .record-date {
    font-size: 12px; color: var(--text-tertiary);
    font-weight: 500; letter-spacing: 0.02em;
  }
  .record-times {
    display: flex; gap: 14px; font-size: 13px;
    color: var(--text-secondary);
  }
  .record-times span { display: flex; align-items: center; gap: 4px; }
  .record-right { display: flex; align-items: center; gap: 12px; }
  .record-duration {
    font-family: 'Lora', serif;
    font-size: 20px; font-weight: 600;
  }
  .record-edit-icon {
    font-size: 14px; color: var(--text-tertiary); opacity: 0.6;
  }

  .duration-good { color: var(--green); }
  .duration-warn { color: var(--yellow); }
  .duration-bad  { color: var(--red); }

  .empty-state {
    text-align: center; padding: 56px 24px;
    color: var(--text-tertiary);
  }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 14px; opacity: 0.6; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ===== DATA ACTIONS ===== */
  .data-actions {
    display: flex; gap: 10px;
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .data-btn {
    flex: 1; padding: 12px;
    border-radius: var(--radius); border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center; gap: 6px;
    transition: all 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .data-btn.export-btn {
    background: var(--bg-card);
    color: var(--text-secondary);
  }
  .data-btn.export-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .data-btn.import-btn {
    background: var(--bg-card);
    color: var(--text-secondary);
  }
  .data-btn.import-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: var(--gold-soft);
  }
  .data-btn:active { transform: scale(0.98); }

  /* ===== STATS ===== */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 18px 16px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .stat-value {
    font-family: 'Lora', serif;
    font-size: 26px; font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 11px; color: var(--text-tertiary);
    font-weight: 500; letter-spacing: 0.03em;
  }

  /* ===== CHART CONTAINER ===== */
  .chart-container {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 18px; margin-bottom: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
  }
  .chart-title {
    font-size: 12px; color: var(--text-tertiary);
    margin-bottom: 14px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(28,25,23,0.4);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-surface);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%; max-width: 340px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.6) inset;
    animation: modalIn 0.22s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal h3 {
    font-family: 'Lora', serif;
    font-size: 18px; font-weight: 600;
    margin-bottom: 22px; text-align: center;
    color: var(--text-primary);
  }
  .modal label {
    display: block; font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--text-tertiary); margin-bottom: 6px;
  }
  .modal input[type="datetime-local"] {
    width: 100%; padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; margin-bottom: 18px;
    outline: none;
    transition: border-color 0.15s;
    box-shadow: var(--shadow-sm) inset;
  }
  .modal input[type="datetime-local"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .modal-btns { display: flex; gap: 8px; margin-top: 4px; }
  .modal-btns button {
    flex: 1; padding: 12px;
    border-radius: var(--radius-sm); border: 1px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel {
    background: var(--bg-base);
    color: var(--text-secondary);
  }
  .btn-cancel:hover { border-color: var(--border-strong); }
  .btn-confirm {
    background: var(--accent);
    color: white; border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(201,100,66,0.25);
  }
  .btn-confirm:hover { background: var(--accent-hover); }
  .btn-danger {
    background: var(--red-soft);
    color: var(--red); border-color: transparent;
  }
  .btn-danger:hover { background: #f9d5d3; }

  /* ===== DIVIDER ===== */
  .divider {
    height: 1px; background: var(--border);
    margin: 20px 0;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; top: 56px; left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: var(--bg-surface);
    padding: 10px 20px;
    border-radius: var(--radius-pill);
    font-size: 13px; font-weight: 500;
    z-index: 999;
    box-shadow: var(--shadow-lg);
    white-space: nowrap;
    animation: toastIn 0.2s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ===== OFFLINE BANNER ===== */
  .offline-banner {
    display: none;
    position: fixed; top: 0; left: 0; right: 0;
    background: var(--yellow); color: white;
    text-align: center; font-size: 12px; font-weight: 600;
    padding: 6px 16px;
    z-index: 998;
    letter-spacing: 0.04em;
  }
  body.offline .offline-banner { display: block; }
  body.offline { padding-top: 28px; }

  /* ===== INSTALL PROMPT ===== */
  .install-banner {
    display: none;
    position: fixed; bottom: 80px; left: 16px; right: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow-lg);
    z-index: 300;
    align-items: center; gap: 12px;
    animation: toastIn 0.22s ease;
  }
  .install-banner.show { display: flex; }
  .install-banner-text { flex: 1; }
  .install-banner-text strong { font-size: 13px; display: block; margin-bottom: 2px; }
  .install-banner-text span { font-size: 11px; color: var(--text-secondary); }
  .install-btn {
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    padding: 8px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
  }
  .install-dismiss {
    background: none; border: none;
    color: var(--text-tertiary); font-size: 16px;
    cursor: pointer; padding: 4px; line-height: 1;
  }
</style>
</head>
<body>

<!-- 打卡页 -->
<div id="page-clock" class="tab-page active clock-page">
  <div class="clock-label">当前时间</div>
  <div class="current-time" id="currentTime"></div>
  <div class="current-date" id="currentDate"></div>

  <div class="punch-area">
    <button class="punch-btn sleep-btn" id="punchBtn" onclick="handlePunch()">
      <span class="btn-icon">🌙</span>
      <span class="btn-label">入睡打卡</span>
    </button>
  </div>

  <div class="status-card" id="statusText">
    今晚还没有打卡哦，准备睡觉时点击按钮 🌙
  </div>

  <div class="quick-adjust">
    <button class="adjust-btn" onclick="openManualModal()"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px"><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> 手动记录</button>
    <button class="adjust-btn" onclick="adjustTime(-15)">← 前推15分钟</button>
    <button class="adjust-btn" onclick="adjustTime(15)">→ 后推15分钟</button>
  </div>
</div>

<!-- 记录页 -->
<div id="page-history" class="tab-page">
  <div class="page-header">
    <h2>睡眠记录</h2>
    <p>点击记录可以编辑或删除</p>
  </div>
  <div class="section-label">历史记录</div>
  <div id="historyList"></div>
  <div class="data-actions">
    <button class="data-btn export-btn" onclick="exportData()">↑ 导出备份</button>
    <button class="data-btn import-btn" onclick="importData()">↓ 导入数据</button>
  </div>
</div>

<!-- 图表页 -->
<div id="page-chart" class="tab-page">
  <div class="page-header">
    <h2>睡眠统计</h2>
    <p>基于你的打卡数据生成</p>
  </div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="chart-container">
    <div class="chart-title">每周平均睡眠时长（小时）</div>
    <canvas id="weeklyChart"></canvas>
  </div>
  <div class="chart-container">
    <div class="chart-title">入睡 → 醒来 甘特图（绿色 ≥7h，橙色 &lt;7h）</div>
    <canvas id="ganttChart"></canvas>
  </div>
</div>

<!-- 底部导航 -->
<!-- 离线提示条 -->
<div class="offline-banner">📡 当前处于离线状态，数据仍可正常记录</div>

<!-- 安装提示 -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">
    <strong>🌙 添加到主屏幕</strong>
    <span>像原生 App 一样使用，随时打卡</span>
  </div>
  <button class="install-btn" onclick="doInstall()">安装</button>
  <button class="install-dismiss" onclick="dismissInstall()">×</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('clock', this)">
    <svg class="tab-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="9"/>
      <polyline points="12 7 12 12 15.5 14"/>
    </svg>
    打卡
  </button>
  <button class="tab-btn" onclick="switchTab('history', this)">
    <svg class="tab-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <line x1="8" y1="7" x2="18" y2="7"/>
      <line x1="8" y1="12" x2="18" y2="12"/>
      <line x1="8" y1="17" x2="18" y2="17"/>
      <circle cx="5" cy="7" r="1.2" fill="currentColor" stroke="none"/>
      <circle cx="5" cy="12" r="1.2" fill="currentColor" stroke="none"/>
      <circle cx="5" cy="17" r="1.2" fill="currentColor" stroke="none"/>
    </svg>
    记录
  </button>
  <button class="tab-btn" onclick="switchTab('chart', this)">
    <svg class="tab-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4"  y="13" width="4" height="7" rx="1"/>
      <rect x="10" y="8"  width="4" height="12" rx="1"/>
      <rect x="16" y="5"  width="4" height="15" rx="1"/>
    </svg>
    统计
  </button>
</div>

<!-- 弹窗 -->
<div class="modal-overlay" id="manualModal">
  <div class="modal">
    <h3 id="modalTitle">手动记录睡眠</h3>
    <label>🌙 入睡时间</label>
    <input type="datetime-local" id="manualSleep">
    <label>☀️ 醒来时间</label>
    <input type="datetime-local" id="manualWake">
    <div class="modal-btns" id="modalBtns">
      <button class="btn-cancel" onclick="closeManualModal()">取消</button>
      <button class="btn-confirm" onclick="saveManualRecord()">保存</button>
    </div>
  </div>
</div>

<script>
// ==================== 数据管理 ====================
const STORAGE_KEY = 'sleep_tracker_data';
const STATE_KEY = 'sleep_tracker_state';

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveRecords(records) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}
function loadState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || {}; }
  catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STATE_KEY, JSON.stringify(state));
}

// ==================== 时间工具 ====================
function getSleepDate(sleepTimeStr) {
  const d = new Date(sleepTimeStr);
  if (d.getHours() < 18) { d.setDate(d.getDate() - 1); }
  d.setHours(0, 0, 0, 0);
  return d;
}

function toAmPm(date) {
  const d = new Date(date);
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function hourToAmPm(decimalHour) {
  let h = Math.floor(decimalHour % 24);
  if (h < 0) h += 24;
  const m = Math.round(((decimalHour % 1) + 1) % 1 * 60);
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
}

function fmtDate(d) { return `${d.getMonth()+1}月${d.getDate()}日`; }
function fmtDateShort(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function weekdayStr(d) { return ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()]; }
function toLocalISO(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function calcDuration(sleep, wake) { return (new Date(wake) - new Date(sleep)) / 3600000; }
function durationText(hours) {
  const h = Math.floor(hours);
  const m = Math.round((hours - h) * 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}
function durationClass(hours) {
  if (hours >= 7 && hours <= 9) return 'duration-good';
  if (hours >= 6 && hours <= 10) return 'duration-warn';
  return 'duration-bad';
}

// ==================== 时钟 ====================
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('currentTime').innerHTML =
    `${h}:${m}:${s}<span class="current-ampm">${ampm}</span>`;
  document.getElementById('currentDate').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${weekdayStr(now)}`;
}
setInterval(updateClock, 1000);
updateClock();

// ==================== 打卡逻辑 ====================
function updatePunchUI() {
  const state = loadState();
  const btn = document.getElementById('punchBtn');
  const statusEl = document.getElementById('statusText');

  if (state.sleeping) {
    btn.className = 'punch-btn wake-btn';
    btn.innerHTML = '<span class="btn-icon">☀️</span><span class="btn-label">醒来打卡</span>';
    const sd = getSleepDate(state.sleepTime);
    statusEl.innerHTML = `已在 <span class="time-highlight">${fmtDate(sd)} ${toAmPm(state.sleepTime)}</span> 入睡<br>正在睡眠中… 💤`;
  } else {
    btn.className = 'punch-btn sleep-btn';
    btn.innerHTML = '<span class="btn-icon">🌙</span><span class="btn-label">入睡打卡</span>';
    const records = loadRecords();
    if (records.length > 0) {
      const last = records[records.length - 1];
      const dur = calcDuration(last.sleep, last.wake);
      statusEl.innerHTML = `上次睡眠 <span class="time-highlight">${durationText(dur)}</span><br>${toAmPm(last.sleep)} → ${toAmPm(last.wake)}`;
    } else {
      statusEl.innerHTML = '今晚还没有打卡哦，准备睡觉时点击按钮 🌙';
    }
  }
}

function handlePunch() {
  const state = loadState();
  const now = new Date().toISOString();
  if (!state.sleeping) {
    saveState({ sleeping: true, sleepTime: now });
    showToast('🌙 晚安，好梦！');
  } else {
    const records = loadRecords();
    records.push({ id: Date.now(), sleep: state.sleepTime, wake: now });
    saveRecords(records);
    saveState({ sleeping: false });
    showToast('☀️ 早安！记录已保存');
  }
  updatePunchUI();
}

function adjustTime(minutes) {
  const state = loadState();
  if (!state.sleeping) {
    const records = loadRecords();
    if (records.length === 0) return showToast('没有可调整的记录');
    const last = records[records.length - 1];
    last.wake = new Date(new Date(last.wake).getTime() + minutes * 60000).toISOString();
    if (calcDuration(last.sleep, last.wake) <= 0) return showToast('时间调整无效');
    saveRecords(records);
    showToast(`已调整醒来时间 ${minutes > 0 ? '+' : ''}${minutes}分钟`);
  } else {
    state.sleepTime = new Date(new Date(state.sleepTime).getTime() + minutes * 60000).toISOString();
    saveState(state);
    showToast(`已调整入睡时间 ${minutes > 0 ? '+' : ''}${minutes}分钟`);
  }
  updatePunchUI();
}

// ==================== 弹窗 ====================
let editingRecordId = null;

function openManualModal() {
  editingRecordId = null;
  document.getElementById('modalTitle').textContent = '手动记录睡眠';
  const now = new Date();
  const yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  yesterday.setHours(23, 0, 0, 0);
  const morning = new Date(now);
  morning.setHours(7, 30, 0, 0);
  document.getElementById('manualSleep').value = toLocalISO(yesterday);
  document.getElementById('manualWake').value = toLocalISO(morning);
  document.getElementById('modalBtns').innerHTML = `
    <button class="btn-cancel" onclick="closeManualModal()">取消</button>
    <button class="btn-confirm" onclick="saveManualRecord()">保存</button>`;
  document.getElementById('manualModal').classList.add('show');
}

function openEditModal(id) {
  editingRecordId = id;
  const records = loadRecords();
  const rec = records.find(r => r.id === id);
  if (!rec) return;
  document.getElementById('modalTitle').textContent = '编辑睡眠记录';
  document.getElementById('manualSleep').value = toLocalISO(new Date(rec.sleep));
  document.getElementById('manualWake').value = toLocalISO(new Date(rec.wake));
  document.getElementById('modalBtns').innerHTML = `
    <button class="btn-cancel" onclick="closeManualModal()">取消</button>
    <button class="btn-danger" onclick="deleteRecord(${id})">删除</button>
    <button class="btn-confirm" onclick="saveManualRecord()">保存</button>`;
  document.getElementById('manualModal').classList.add('show');
}

function closeManualModal() {
  document.getElementById('manualModal').classList.remove('show');
  editingRecordId = null;
}

function saveManualRecord() {
  const sleepVal = document.getElementById('manualSleep').value;
  const wakeVal = document.getElementById('manualWake').value;
  if (!sleepVal || !wakeVal) return showToast('请填写完整时间');
  const sleepTime = new Date(sleepVal).toISOString();
  const wakeTime = new Date(wakeVal).toISOString();
  if (calcDuration(sleepTime, wakeTime) <= 0) return showToast('醒来时间需晚于入睡时间');
  if (calcDuration(sleepTime, wakeTime) > 24) return showToast('睡眠时间不能超过24小时');
  const records = loadRecords();
  if (editingRecordId !== null) {
    const idx = records.findIndex(r => r.id === editingRecordId);
    if (idx !== -1) { records[idx].sleep = sleepTime; records[idx].wake = wakeTime; }
  } else {
    records.push({ id: Date.now(), sleep: sleepTime, wake: wakeTime });
  }
  records.sort((a, b) => new Date(a.sleep) - new Date(b.sleep));
  saveRecords(records);
  closeManualModal();
  showToast(editingRecordId !== null ? '✓ 记录已更新' : '✓ 记录已保存');
  editingRecordId = null;
  renderHistory();
  updatePunchUI();
}

function deleteRecord(id) {
  if (!confirm('确定删除这条记录吗？')) return;
  const records = loadRecords().filter(r => r.id !== id);
  saveRecords(records);
  closeManualModal();
  renderHistory();
  updatePunchUI();
  showToast('已删除');
}

// ==================== 导出 / 导入 ====================
function exportData() {
  const records = localStorage.getItem(STORAGE_KEY) || '[]';
  const blob = new Blob([records], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `sleep-data-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('数据已导出');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        if (Array.isArray(data)) {
          const existing = loadRecords();
          const existingIds = new Set(existing.map(r => r.id));
          let added = 0;
          data.forEach(r => {
            if (r.sleep && r.wake && !existingIds.has(r.id)) {
              existing.push({ id: r.id || Date.now() + Math.random(), sleep: r.sleep, wake: r.wake });
              added++;
            }
          });
          existing.sort((a, b) => new Date(a.sleep) - new Date(b.sleep));
          saveRecords(existing);
          showToast(`导入成功，新增 ${added} 条记录`);
          renderHistory(); updatePunchUI();
        } else { showToast('文件格式错误'); }
      } catch { showToast('文件解析失败'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ==================== 记录列表 ====================
function renderHistory() {
  const records = loadRecords().slice().reverse();
  const container = document.getElementById('historyList');
  if (records.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">😴</div>
      <p>还没有睡眠记录<br>快去打卡吧</p>
    </div>`;
    return;
  }
  container.innerHTML = records.map(r => {
    const dur = calcDuration(r.sleep, r.wake);
    const sd = getSleepDate(r.sleep);
    return `
      <div class="record-card" onclick="openEditModal(${r.id})">
        <div class="record-left">
          <div class="record-date">${fmtDate(sd)} ${weekdayStr(sd)}</div>
          <div class="record-times">
            <span>🌙 ${toAmPm(r.sleep)}</span>
            <span>☀️ ${toAmPm(r.wake)}</span>
          </div>
        </div>
        <div class="record-right">
          <div class="record-duration ${durationClass(dur)}">${durationText(dur)}</div>
          <div class="record-edit-icon"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
        </div>
      </div>`;
  }).join('');
}

// ==================== 图表 ====================
let weeklyChart = null;
let ganttChart = null;

function getWeekMonday(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d); mon.setDate(diff); mon.setHours(0, 0, 0, 0);
  return mon;
}

function toGanttHour(dateStr) {
  const d = new Date(dateStr);
  let h = d.getHours() + d.getMinutes() / 60;
  if (h < 18) h += 24;
  return h;
}

function renderCharts() {
  const records = loadRecords();
  const chartFontColor = '#78716c';
  const gridColor = 'rgba(120,113,108,0.12)';

  if (records.length === 0) {
    document.getElementById('statsGrid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📊</div><p>记录数据后<br>这里会显示统计图表</p></div>';
    return;
  }

  const allDurations = records.map(r => calcDuration(r.sleep, r.wake));
  const avgDur = allDurations.reduce((a, b) => a + b, 0) / allDurations.length;

  const avgSleepHour = records.reduce((sum, r) => {
    const d = new Date(r.sleep); let h = d.getHours() + d.getMinutes() / 60;
    if (h < 18) h += 24; return sum + h;
  }, 0) / records.length;

  const avgWakeHour = records.reduce((sum, r) => {
    const d = new Date(r.wake); let h = d.getHours() + d.getMinutes() / 60;
    return sum + h;
  }, 0) / records.length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-value ${durationClass(avgDur)}">${durationText(avgDur)}</div>
      <div class="stat-label">平均睡眠时长</div>
    </div>
    <div class="stat-card">
      <div class="stat-value">${records.length}</div>
      <div class="stat-label">累计记录天数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="font-size:20px">${hourToAmPm(avgSleepHour)}</div>
      <div class="stat-label">平均入睡时间</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" style="font-size:20px">${hourToAmPm(avgWakeHour)}</div>
      <div class="stat-label">平均醒来时间</div>
    </div>`;

  // 每周图
  const weekMap = new Map();
  records.forEach(r => {
    const sd = getSleepDate(r.sleep);
    const mon = getWeekMonday(sd);
    const key = mon.getTime();
    if (!weekMap.has(key)) weekMap.set(key, { mon, durations: [] });
    weekMap.get(key).durations.push(calcDuration(r.sleep, r.wake));
  });
  const weeks = Array.from(weekMap.values()).sort((a, b) => a.mon - b.mon).slice(-12);
  const weekLabels = weeks.map(w => fmtDateShort(w.mon));
  const weekAvgs = weeks.map(w => Math.round(w.durations.reduce((a, b) => a + b, 0) / w.durations.length * 100) / 100);

  if (weeklyChart) weeklyChart.destroy();
  weeklyChart = new Chart(document.getElementById('weeklyChart'), {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [{
        data: weekAvgs,
        backgroundColor: weekAvgs.map(d =>
          d >= 7 && d <= 9 ? 'rgba(59,124,94,0.75)' :
          d >= 6 ? 'rgba(181,131,10,0.75)' : 'rgba(192,57,43,0.75)'),
        borderRadius: 6, borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `平均 ${durationText(ctx.raw)}` } }
      },
      scales: {
        x: { ticks: { color: chartFontColor, font: { size: 10 } }, grid: { display: false } },
        y: { min: 0, max: 12, ticks: { color: chartFontColor, stepSize: 2 }, grid: { color: gridColor } }
      }
    }
  });

  // 甘特图
  const ganttRecords = records.slice(-21);
  const ganttLabels = ganttRecords.map(r => fmtDateShort(getSleepDate(r.sleep)));
  const ganttData = ganttRecords.map(r => {
    const sh = toGanttHour(r.sleep);
    let wh = toGanttHour(r.wake);
    if (wh <= sh) wh += 24;
    return [sh, wh];
  });
  const ganttColors = ganttRecords.map(r =>
    calcDuration(r.sleep, r.wake) >= 7 ? 'rgba(59,124,94,0.8)' : 'rgba(212,135,74,0.85)');

  const allSh = ganttData.map(d => d[0]);
  const allWh = ganttData.map(d => d[1]);
  const yMin = Math.floor(Math.min(...allSh)) - 0.5;
  const yMax = Math.ceil(Math.max(...allWh)) + 0.5;

  if (ganttChart) ganttChart.destroy();
  ganttChart = new Chart(document.getElementById('ganttChart'), {
    type: 'bar',
    data: {
      labels: ganttLabels,
      datasets: [{ data: ganttData, backgroundColor: ganttColors, borderRadius: 4, borderSkipped: false, barPercentage: 0.55 }]
    },
    options: {
      responsive: true, indexAxis: 'x',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: items => ganttLabels[items[0].dataIndex],
            label: ctx => {
              const [s, w] = ctx.raw;
              return `🌙 ${hourToAmPm(s)} →  ☀️ ${hourToAmPm(w)}  （${durationText(w - s)}）`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { color: chartFontColor, font: { size: 10 }, maxRotation: 50, minRotation: 30 }, grid: { display: false } },
        y: {
          reverse: true, min: yMin, max: yMax,
          ticks: {
            color: chartFontColor, stepSize: 1,
            callback: v => { let h = ((v % 24) + 24) % 24; const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h} ${ap}`; }
          },
          grid: { color: gridColor }
        }
      }
    }
  });
}

// ==================== 页面切换 ====================
function switchTab(name, el) {
  document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'history') renderHistory();
  if (name === 'chart') renderCharts();
}

// ==================== Toast ====================
function showToast(msg) {
  const div = document.createElement('div');
  div.className = 'toast';
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; div.style.transition = 'opacity 0.3s'; }, 1800);
  setTimeout(() => div.remove(), 2200);
}

// ==================== 初始化 ====================
updatePunchUI();

// ==================== PWA：Service Worker 注册 ====================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered, scope:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}

// ==================== PWA：离线状态检测 ====================
function updateOnlineStatus() {
  document.body.classList.toggle('offline', !navigator.onLine);
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ==================== PWA：安装提示 ====================
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // 如果用户没有永久关闭过提示，就显示
  if (!localStorage.getItem('pwa_install_dismissed')) {
    setTimeout(() => document.getElementById('installBanner').classList.add('show'), 2000);
  }
});

function doInstall() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
    if (choice.outcome === 'accepted') showToast('🎉 已添加到主屏幕！');
  });
}

function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('pwa_install_dismissed', '1');
}

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});
</script>
</body>
</html>
